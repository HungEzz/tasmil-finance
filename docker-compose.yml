version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tasmil-backend-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    depends_on:
      - cache
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tasmil-frontend-client
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env.local
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://server:5000/api
    depends_on:
      - server
    restart: always

  cache:
    image: redis:7-alpine
    container_name: tasmil-redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: always

volumes:
  redis-data:
